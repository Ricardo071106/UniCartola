services:
  - type: web
    name: campus-league
    runtime: node
    plan: free
    buildCommand: chmod +x scripts/render-build.sh && ./scripts/render-build.sh
    startCommand: chmod +x scripts/render-start.sh && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
