# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: unicartola
    runtime: node
    plan: free
    buildCommand: chmod +x scripts/render-build.sh && ./scripts/render-build.sh
    startCommand: npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=460"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: unicartola-db
          property: connectionString
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: CRON_SECRET
        generateValue: true

databases:
  - name: unicartola-db
    plan: free
    databaseName: unicartola
    user: unicartola
