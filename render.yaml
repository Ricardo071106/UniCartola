services:
  - type: web
    name: campus-league
    runtime: node
    plan: free
    buildCommand: chmod +x scripts/render-build.sh && ./scripts/render-build.sh
    startCommand: chmod +x scripts/render-start.sh && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_REGION
        value: us-west-2
      - key: SESSION_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: NDU_SYNC_INTERVAL_SECONDS
        value: "21600"

  - type: cron
    name: ndu-sync
    schedule: "0 */6 * * *"
    startCommand: >-
      curl -fsS -X POST
      -H "Authorization: Bearer ${CRON_SECRET}"
      "${NEXT_PUBLIC_APP_URL}/api/cron/scrape"
